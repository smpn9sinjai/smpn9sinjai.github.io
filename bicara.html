<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Voice Bot Siswa (Continuous)</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    button { padding: 10px 20px; margin-right: 10px; }
    .box { margin-top: 15px; padding: 10px; background: #fff; border-radius: 8px; }
    .active { color: green; }
    .off { color: red; }
  </style>
</head>
<body>

<h2>🎤 Voice Bot Siswa (Auto Jalan Terus)</h2>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>

<div class="box">Status: <span id="status" class="off">OFF</span></div>
<div class="box">Hasil suara: <span id="result">-</span></div>
<div class="box">Data siswa: <pre id="data">-</pre></div>

<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
  alert("Gunakan Chrome");
}

const recognition = new SpeechRecognition();

recognition.lang = "id-ID";
recognition.continuous = true;
recognition.interimResults = true;

let isRunning = false;

// START
function start() {
  if (isRunning) return;
  isRunning = true;
  recognition.start();
  document.getElementById("status").innerText = "ON";
  document.getElementById("status").className = "active";
}

// STOP
function stop() {
  isRunning = false;
  recognition.stop();
  document.getElementById("status").innerText = "OFF";
  document.getElementById("status").className = "off";
}

// HASIL SUARA
recognition.onresult = async (event) => {
  let text = "";

  for (let i = event.resultIndex; i < event.results.length; i++) {
    text += event.results[i][0].transcript;
  }

  document.getElementById("result").innerText = text;

  // hanya kirim kalau kalimat sudah final
  if (event.results[event.results.length - 1].isFinal) {
    cariSiswa(text);
  }
};

// AUTO RESTART (BIAR TIDAK MATI)
recognition.onend = () => {
  if (isRunning) {
    recognition.start();
  }
};

// ERROR HANDLE
recognition.onerror = (e) => {
  console.log("Error:", e);

  if (e.error === "not-allowed") {
    alert("Izinkan microphone");
    stop();
  }
};

// QUERY API
async function cariSiswa(query) {
  try {
    const res = await fetch("/api/siswa?q=" + encodeURIComponent(query));
    const data = await res.json();

    document.getElementById("data").innerText =
      data.length ? JSON.stringify(data, null, 2) : "Tidak ditemukan";

  } catch (err) {
    document.getElementById("data").innerText = "Error: " + err.message;
  }
}
</script>

</body>
</html>
