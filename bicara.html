<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Voice Bot Siswa</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    #result, #data {
      margin-top: 20px;
      padding: 10px;
      background: #fff;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <h2>🎤 Voice Search Siswa</h2>
  <button onclick="startRecognition()">Mulai Bicara</button>

  <div id="result">Hasil suara: -</div>
  <div id="data">Data siswa: -</div>

  <script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      alert("Browser tidak mendukung speech recognition (pakai Chrome)");
    }

    const recognition = new SpeechRecognition();
    recognition.lang = 'id-ID';
    recognition.interimResults = false;

    function startRecognition() {
      recognition.start();
    }

    recognition.onresult = async (event) => {
      const text = event.results[0][0].transcript;
      document.getElementById("result").innerText = "Hasil suara: " + text;

      // kirim ke API siswa
      try {
        const res = await fetch("/api/siswa?q=" + encodeURIComponent(text));
        const data = await res.json();

        if (data.length === 0) {
          document.getElementById("data").innerText = "Data tidak ditemukan";
        } else {
          document.getElementById("data").innerText = JSON.stringify(data, null, 2);
        }

      } catch (err) {
        document.getElementById("data").innerText = "Error: " + err.message;
      }
    };

    recognition.onerror = (event) => {
      alert("Error: " + event.error);
    };
  </script>

</body>
</html>
