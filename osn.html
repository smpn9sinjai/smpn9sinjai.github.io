<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>SIMULASI OSN 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    background:#020617;
    font-family:'Poppins',sans-serif;
    position:relative;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* BACKGROUND ANIMASI */

.bg{
    position:absolute;
    inset:0;
    overflow:hidden;
}

.circle{
    position:absolute;
    border-radius:50%;
    filter:blur(100px);
    opacity:.5;
    animation:float 12s ease-in-out infinite;
}

.c1{
    width:500px;
    height:500px;
    background:#00e5ff;
    top:-120px;
    left:-120px;
}

.c2{
    width:500px;
    height:500px;
    background:#3b82f6;
    bottom:-150px;
    right:-100px;
    animation-delay:4s;
}

.c3{
    width:350px;
    height:350px;
    background:#7c3aed;
    bottom:50px;
    left:25%;
    animation-delay:2s;
}

@keyframes float{
    0%{
        transform:translateY(0px) scale(1);
    }

    50%{
        transform:translateY(-30px) scale(1.08);
    }

    100%{
        transform:translateY(0px) scale(1);
    }
}

/* GRID */

.grid{
    position:absolute;
    width:100%;
    height:100%;
    background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);

    background-size:70px 70px;

    animation:gridMove 18s linear infinite;
}

@keyframes gridMove{
    from{
        transform:translate(0,0);
    }
    to{
        transform:translate(-70px,-70px);
    }
}

/* CARD */

.container{
    position:relative;
    z-index:2;

    width:92%;
    max-width:1700px;

    padding:70px;

    border-radius:40px;

    background:rgba(255,255,255,0.07);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.15);

    text-align:center;

    box-shadow:
    0 0 40px rgba(0,229,255,.2),
    inset 0 0 20px rgba(255,255,255,.05);
}

/* TOP LABEL */

.label{
    display:inline-block;

    padding:12px 28px;

    border-radius:100px;

    background:rgba(0,229,255,.12);

    border:1px solid rgba(0,229,255,.4);

    font-size:22px;

    letter-spacing:4px;

    margin-bottom:35px;

    color:#67e8f9;
	font-size:36px;
}

/* TITLE */

.title{
    font-family:'Orbitron',sans-serif;

    font-size:120px;

    font-weight:900;

    line-height:1.1;

    letter-spacing:6px;

    margin-bottom:20px;

    text-transform:uppercase;

    background:linear-gradient(
        90deg,
        #ffffff,
        #67e8f9,
        #60a5fa,
        #ffffff
    );

    background-size:300%;

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:shine 6s linear infinite;

    text-shadow:
    0 0 20px rgba(255,255,255,.2),
    0 0 50px rgba(0,229,255,.2);
}

@keyframes shine{
    0%{
        background-position:0%;
    }

    100%{
        background-position:300%;
    }
}

/* SUBTITLE */

.subtitle{
    font-size:50px;

    font-weight:bold;

    color:#dbeafe;

    letter-spacing:2px;

    margin-bottom:55px;
}

/* CLOCK */

.clock-wrapper{
    display:inline-block;

    padding:15px 60px;

    border-radius:35px;

    background:rgba(0,0,0,.35);

    border:1px solid rgba(255,255,255,.1);

    box-shadow:
    0 0 40px rgba(0,229,255,.2);
}

.clock{
    font-family:'Orbitron',sans-serif;

    font-size:150px;

    font-weight:900;

    color:#00e5ff;

    letter-spacing:8px;

 
}

.date{
    margin-top:15px;

    font-size:50px;

    color:#cbd5e1;

    letter-spacing:2px;
}

/* FOOTER */

.footer{
    margin-top:60px;

    font-size:50px;

    line-height:1.8;

    color:#e2e8f0;
}

/* RUNNING TEXT */

.marquee{
    position:absolute;

    bottom:0;

    width:100%;

    overflow:hidden;

    background:rgba(0,0,0,.5);

    padding:18px 0;

    border-top:1px solid rgba(255,255,255,.1);

    z-index:3;
}

.marquee span{
    display:inline-block;

    white-space:nowrap;

    padding-left:100%;

    animation:marquee 20s linear infinite;

    font-size:30px;

    color:#7dd3fc;

    font-weight:600;

    letter-spacing:2px;
}

@keyframes marquee{
    from{
        transform:translateX(0);
    }

    to{
        transform:translateX(-100%);
    }
}

/* RESPONSIVE */

@media(max-width:768px){

    .container{
        padding:30px 20px;
    }

    .title{
        font-size:50px;
    }

    .subtitle{
        font-size:20px;
    }

    .clock{
        font-size:60px;
    }

    .date{
        font-size:18px;
    }

    .footer{
        font-size:18px;
    }

    .marquee span{
        font-size:18px;
    }

    .clock-wrapper{
        padding:20px;
    }

    .label{
        font-size:14px;
    }
}

</style>
</head>

<body>

<div class="bg">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>
    <div class="grid"></div>
</div>

<div class="container">
	 
 <div class="label">

   <img 
      src="https://app.smpn9sinjai.sch.id/smp.jpg"
      class="logo"
   >

   <span>UPTD SMP NEGERI 9 SINJAI</span>

</div>


<style>

.label{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:18px;

    padding:14px 30px;

    border-radius:100px;

    background:rgba(0,229,255,.12);

    border:1px solid rgba(0,229,255,.4);

    color:#67e8f9;

    font-size:35px;

    font-weight:600;

    margin:auto;
	margin-bottom:50px;
}

.label .logo{
    width:70px;
    height:70px;

    border-radius:50%;

    object-fit:cover;

    display:block;
}

.label span{
    display:flex;
    align-items:center;

    height:70px;
}

</style>

    <div class="title">
        SIMULASI OSN 2026
    </div>

   
    <div class="clock-wrapper">

        <div class="clock" id="clock">
            00:00:00
        </div>

        <div class="date" id="date">
            -
        </div>

    </div>

    <div class="footer">
      
        Tetap Semangat • Jujur • Disiplin • Berprestasi
    </div>

</div>

<div class="marquee">
    <span>
        ✨ SELAMAT DATANG PESERTA SIMULASI OSN 2026 • SEMOGA SUKSES DAN MERAIH PRESTASI TERBAIK • UPTD SMP NEGERI 9 SINJAI ✨
    </span>
</div>

<script>

function updateClock(){

    const now = new Date();

    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');

    document.getElementById("clock").innerHTML =
    `${h}:${m}:${s}`;

    const hari = [
        "Minggu",
        "Senin",
        "Selasa",
        "Rabu",
        "Kamis",
        "Jumat",
        "Sabtu"
    ];

    const bulan = [
        "Januari",
        "Februari",
        "Maret",
        "April",
        "Mei",
        "Juni",
        "Juli",
        "Agustus",
        "September",
        "Oktober",
        "November",
        "Desember"
    ];

    const tanggal =
    `${hari[now.getDay()]}, ${now.getDate()} ${bulan[now.getMonth()]} ${now.getFullYear()}`;

    document.getElementById("date").innerHTML =
    tanggal;
}

setInterval(updateClock,1000);

updateClock();

</script>

</body>
</html>
