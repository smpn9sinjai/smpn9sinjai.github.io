

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIMULASI OSN 2026</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
 padding-top:15px;
    background:#000;
    color:#fff;
    font-family:Arial, sans-serif;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
   
    overflow:hidden;
}

.container{
    text-align:center;
    width:95%;
}

.header{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    margin-bottom:1px;
}

.logo{
    width:80px;
    height:80px;
    border-radius:50%;
}

.school{
    font-size:36px;
    font-weight:bold;
}

.title{
    font-size:100px;
    font-weight:bold;
    margin-bottom:40px;
}

.clock{
    font-size:150px;
    font-weight:bold;
    letter-spacing:5px;
}

.date{
    font-size:45px;
    margin-top:10px;
}

.footer{
    margin-top:50px;
    font-size:40px;
}

.marquee{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    border-top:1px solid #fff;
    overflow:hidden;
    padding:15px 0;
}

.marquee span{
    display:inline-block;
    white-space:nowrap;
    padding-left:100%;
    animation:jalan 20s linear infinite;
    font-size:30px;
}

@keyframes jalan{
    from{transform:translateX(0);}
    to{transform:translateX(-100%);}
}

.fullscreen-btn{
    position:fixed;
    top:20px;
    right:20px;
    padding:12px 20px;
    font-size:18px;
    font-weight:bold;
    background:#fff;
    color:#000;
    border:none;
    border-radius:8px;
    cursor:pointer;
    z-index:9999;
}

.fullscreen-btn:hover{
    opacity:.9;
}

@media(max-width:768px){

    .school{
        font-size:18px;
    }

    .logo{
        width:50px;
        height:50px;
    }

    .title{
        font-size:40px;
    }

    .clock{
        font-size:60px;
    }

    .date{
        font-size:20px;
    }

    .footer{
        font-size:18px;
    }

    .marquee span{
        font-size:16px;
    }

    .fullscreen-btn{
        font-size:14px;
        padding:10px 14px;
    }
}
</style>
</head>

<body>

<button id="fullscreenBtn" class="fullscreen-btn">
    FULL SCREEN
</button>

 <div style="font-size:50px;font-weight:bold;position:fixed;left:2px;top:5px;border-right:6px solid white;border-bottom:6px solid white;padding:5px 30px;border-bottom-right-radius: 10px;" >
      <center><span id="status">  TOKEN :</span><br>
		<span id="token" style="font-size:80px;font-weight:bold"> </span></center>
    </div>

<div class="container">

    <div class="header">
        <img src="https://app.smpn9sinjai.sch.id/smp.jpg" class="logo">
        <div class="school">UPTD SMP NEGERI 9 SINJAI</div>
    </div>

    <div class="title">
        <span style="font-size:60px">Sedang Berlangsung</span><br> 
		OSN-K 2026 | SMP
    </div>

    <div class="clock" id="clock">
        00:00:00
    </div>

    <div class="date" id="date">
        -
    </div>
  
    <div class="footer">
        Tetap Semangat • Jujur • Disiplin • Berprestasi
    </div>

</div>

<div class="marquee">
    <span>
        ✨ SELAMAT DATANG PESERTA  OSN-K 2026 • SEMOGA SUKSES DAN MERAIH PRESTASI TERBAIK • UPTD SMP NEGERI 9 SINJAI ✨
    </span>
</div>

<script>

const btn = document.getElementById("fullscreenBtn");
const cbb=document.getElementById("status")

btn.addEventListener("click", async () => {
    try{
        await document.documentElement.requestFullscreen();
        btn.style.display = "none";
    }catch(err){
        console.log(err);
    }
});

document.addEventListener("fullscreenchange", () => {
    if(!document.fullscreenElement){
        btn.style.display = "block";
    }
});

function updateClock(){
      
    const now = new Date();

    document.getElementById("clock").innerHTML =
        String(now.getHours()).padStart(2,'0') + ":" +
        String(now.getMinutes()).padStart(2,'0') + ":" +
        String(now.getSeconds()).padStart(2,'0');

    const hari = [
        "Minggu","Senin","Selasa","Rabu",
        "Kamis","Jumat","Sabtu"
    ];

    const bulan = [
        "Januari","Februari","Maret","April",
        "Mei","Juni","Juli","Agustus",
        "September","Oktober","November","Desember"
    ];

    document.getElementById("date").innerHTML =
        hari[now.getDay()] + ", " +
        now.getDate() + " " +
        bulan[now.getMonth()] + " " +
        now.getFullYear();
}

setInterval(updateClock,1000);
//updateClock();


function sitoken(){
      if(cbb.innerText=="TOKEN :"){cbb.innerText=""}
	  else {cbb.innerText="TOKEN :"}
}
//setInterval(sitoken,500);

let ws;
let reconnectDelay = 3000; // 3 detik
let shouldReconnect = true;

function connectWebSocket() {
   // ws = new WebSocket("ws://10.205.134.78:8080/ws");
   ws = new WebSocket("wss://randee-streetless-gnashingly.ngrok-free.dev/ws")

    document.getElementById("status").textContent = "🟢 Connecting...";

    ws.onopen = () => {
       // document.getElementById("status").textContent = "🟢 Connected";
	     document.getElementById("status").textContent = "TOKEN :"
    };

    ws.onmessage = (e) => {
	    let gs=JSON.parse(e.data)
		 if(gs.kode==5){ 
		   document.getElementById("token").textContent = (gs.isi || "").toUpperCase();
	}
	}

    ws.onclose = () => {
        document.getElementById("status").textContent = "🔴 Disconnected";
        if (shouldReconnect) {
            setTimeout(() => {
                console.log("Reconnecting WebSocket...");
                connectWebSocket();
            }, reconnectDelay);
        }
    };

    ws.onerror = () => {
        document.getElementById("status").textContent = "⚠️ Error";
        ws.close(); // biar masuk onclose dan reconnect
    };
}

connectWebSocket(); // mulai saat halaman dibuka



function sendMsg() {
    if (ws.readyState === WebSocket.OPEN) {
	   let sd=document.getElementById("msg").value
	   
	  
	   
	   let tgl = new Date();
	    let stamp = `${tgl.toISOString().slice(0, 19)}`;
		 let gd=JSON.stringify({"kode":5, "isi":sd, "tgl":stamp})
        ws.send(gd);
    } else {
        alert("WebSocket belum terhubung!");
    }
}
 
</script>

</body>
</html>
